#Projects parameters

[model_config]
randomSeeds = 12
population = 200
generation = 30 
cxProb = 0.8
mutProb = 0.15
elitismProb = 0.05
totalRuns = 10
initialMinDepth = 2
initialMaxDepth = 6
maxDepth = 10 

